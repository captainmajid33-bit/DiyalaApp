name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: List all files (Diagnosis)
        run: ls -R
      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install Dependencies
        run: |
          # سنترك الأمر يبحث عن package.json في أي مكان داخل المشروع
          find . -name "package.json" -exec dirname {} \; > path.txt
          cd $(head -n 1 path.txt)
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Sync Capacitor
        run: |
          cd $(head -n 1 path.txt)
          npx cap sync
      - name: Build with Gradle
        run: |
          cd $(head -n 1 path.txt)/android
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app-debug.apk"
