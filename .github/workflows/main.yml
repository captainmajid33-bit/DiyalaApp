name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Find and Install Dependencies
        run: |
          # البحث عن مكان ملف package.json الحقيقي
          PKG_PATH=$(find . -name "package.json" -exec dirname {} \;)
          echo "Found project at: $PKG_PATH"
          cd "$PKG_PATH"
          pnpm install --no-frozen-lockfile --ignore-scripts
          
          # مزامنة Capacitor
          npx cap sync
          
          # بناء الأندرويد
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all
          
          # نسخ الملف الناتج للمجلد الرئيسي ليتم رفعه
          cp app/build/outputs/apk/debug/app-debug.apk ../../app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
