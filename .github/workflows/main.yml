name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      # 1. كشف مكان الملفات
      - name: Debug - Find package.json
        run: find . -name "package.json"
        
      # 2. بناء الديناميكي (سيجد الملف أينما كان)
      - name: Build with Dynamic Path
        run: |
          # البحث عن مكان ملف package.json
          PROJECT_ROOT=$(find . -name "package.json" -exec dirname {} \;)
          echo "Found project at: $PROJECT_ROOT"
          cd "$PROJECT_ROOT"
          
          # تنصيب الأدوات
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --ignore-scripts
          
          # المزامنة والبناء
          npx cap sync
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all
          
          # البحث عن ملف الـ APK ونسخه
          find . -name "app-debug.apk" -exec cp {} ../.. \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
