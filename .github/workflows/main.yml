name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Fix Directory Structure
        run: |
          # إنشاء مجلد www إذا لم يكن موجوداً
          mkdir -p www
          # نقل ملفات الـ HTML والـ JS والـ CSS إلى داخل www
          # نستخدم find للبحث عن أي ملف من هذه الأنواع ونقله للمجلد
          find . -maxdepth 1 -name "*.html" -exec mv {} www/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.js" -exec mv {} www/ \; 2>/dev/null || true
          find . -maxdepth 1 -name "*.css" -exec mv {} www/ \; 2>/dev/null || true
      - name: Sync Capacitor
        run: npx cap sync
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
