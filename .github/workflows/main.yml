name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Prepare and Build
        run: |
          npm install -g pnpm
          pnpm install --no-frozen-lockfile --ignore-scripts
          
          # التأكد من وجود مجلد www
          mkdir -p www
          # التأكد من وجود index.html (إذا لم يكن موجوداً، سننشئ واحداً فارغاً لكي لا يفشل الـ sync)
          if [ ! -f www/index.html ]; then echo "<html><body>App</body></html>" > www/index.html; fi
          
          # المزامنة
          npx cap sync
          
          # البناء
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --warning-mode all
          
          # نسخ الـ APK
          cp app/build/outputs/apk/debug/app-debug.apk ../app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app-debug.apk
